<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="discGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="50%" style="stop-color:#EC4899"/>
      <stop offset="100%" style="stop-color:#F59E0B"/>
    </linearGradient>
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.5)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Outer disc -->
  <circle cx="50" cy="50" r="46" fill="url(#discGrad)"/>

  <!-- Rainbow rings effect -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <circle cx="50" cy="50" r="34" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <circle cx="50" cy="50" r="28" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <circle cx="50" cy="50" r="22" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- Center hole -->
  <circle cx="50" cy="50" r="12" fill="#1a1a2e"/>
  <circle cx="50" cy="50" r="12" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

  <!-- Shine effect -->
  <ellipse cx="32" cy="32" rx="18" ry="12" fill="url(#shineGrad)" transform="rotate(-35 32 32)"/>
</svg>